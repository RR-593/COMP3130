name: trustmee_app
description: TrustMee — personal location tracker. Flutter template scaffolded from Pencil wireframes.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  geolocator: ^13.0.1
  flutter_map_animations: ^0.7.0
  geocoding: ^3.0.0
  flutter_dotenv: ^5.2.1
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  # TODO: add when wiring real features
  # shared_preferences: ^2.3.0     # settings persistence

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .secrets/maptiler_api
  # TODO: drop branding/logo PNGs into assets/images/ and reference them in
  # the screens where you see `// TODO: add image asset` comments.
